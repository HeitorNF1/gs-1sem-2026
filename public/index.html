<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo — Solução Espacial</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020b18;
      --surface: #071a2e;
      --accent: #00e5ff;
      --accent2: #7b61ff;
      --text: #e8f4f8;
      --muted: #4a7a94;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Starfield */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to   { opacity: 0.9; transform: scale(1.4); }
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb1 { width: 400px; height: 400px; background: var(--accent2); top: -100px; left: -100px; }
    .orb2 { width: 350px; height: 350px; background: var(--accent);  bottom: -80px; right: -80px; animation-delay: -6s; }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(40px, 30px); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 3.5rem;
      background: rgba(7, 26, 46, 0.7);
      border: 1px solid rgba(0, 229, 255, 0.15);
      border-radius: 20px;
      backdrop-filter: blur(18px);
      max-width: 520px;
      width: 90%;
      animation: fadeUp 0.8s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 100px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.5rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    h1 {
      font-size: clamp(2.2rem, 7vw, 3.4rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1rem;
      animation: fadeUp 0.8s 0.2s ease both;
    }
    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2rem;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: #2ecc71;
      animation: fadeUp 0.8s 0.4s ease both;
    }
    .dot {
      width: 8px; height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.5); }
      50%       { box-shadow: 0 0 0 6px rgba(46,204,113,0); }
    }

    .divider {
      width: 48px; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      margin: 1.5rem auto;
      animation: fadeUp 0.8s 0.35s ease both;
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="card">
    <div class="badge">🚀 Deploy inicial</div>
    <h1>Olá,<br/><span>Mundo!</span></h1>
    <div class="divider"></div>
    <p>
      Aplicação Node.js rodando no Azure App Service.<br/>
      Em breve, a solução espacial completa estará aqui.
    </p>
    <div class="status">
      <span class="dot"></span>
      SERVIDOR ONLINE
    </div>
  </div>

  <script>
    // Gera estrelas aleatórias
    const container = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2 + 0.5;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --d:${2 + Math.random()*4}s;
        animation-delay:${Math.random()*4}s;
      `;
      container.appendChild(s);
    }
  </script>
</body>
</html>
